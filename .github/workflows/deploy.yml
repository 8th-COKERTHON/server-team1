name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Actions 탭에서 수동 실행도 가능

env:
  IMAGE_NAME: hyeonszz/server-team1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 빌드 & 푸시
        uses: docker/build-push-action@v6
        with:
          context: .
          # EC2 가 t3.micro(x86) 이므로 amd64 로 고정한다. ARM 으로 빌드되면 exec format error.
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # SSM 으로 명령을 밀어넣는다. EC2 가 바깥으로 폴링하는 구조라
      # 보안 그룹에 22번(SSH) 인바운드를 열 필요가 없다.
      - name: SSM 으로 배포 명령 전송
        id: send
        run: |
          set -euo pipefail
          # 잡 사이로 값을 넘기지 않고 워크플로 env + 커밋 SHA 로 직접 조립한다.
          : "${IMAGE_NAME:?IMAGE_NAME 이 비었다}"
          : "${GITHUB_SHA:?GITHUB_SHA 가 비었다}"
          IMAGE="${IMAGE_NAME}:${GITHUB_SHA}"
          echo "배포할 이미지: $IMAGE"
          cat > /tmp/params.json <<EOF
          {
            "commands": [
              "set -e",
              "docker pull ${IMAGE}",
              "docker rm -f hackathon 2>/dev/null || true",
              "docker run -d --name hackathon -p 8080:8080 --env-file /home/ec2-user/.env --restart unless-stopped ${IMAGE}",
              "docker image prune -f"
            ]
          }
          EOF
          echo "----- 전송할 명령 -----"
          cat /tmp/params.json
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy ${IMAGE}" \
            --parameters file:///tmp/params.json \
            --query "Command.CommandId" --output text)
          echo "command-id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "CommandId: $CMD_ID"

      - name: 실행 결과 대기
        env:
          CMD_ID: ${{ steps.send.outputs.command-id }}
        run: |
          set -uo pipefail
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i] $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut) echo "배포 실패"; FAILED=1; break ;;
            esac
            sleep 5
          done

          echo "----- stdout -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" --output text
          echo "----- stderr -----"
          aws ssm get-command-invocation --command-id "$CMD_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardErrorContent" --output text

          if [ "${FAILED:-0}" = "1" ] || [ "${STATUS:-}" != "Success" ]; then exit 1; fi
