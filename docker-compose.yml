services:
  postgres:
    image: postgres:18-alpine
    container_name: hackathon-postgres
    # 호스트 5433 -> 컨테이너 5432 (로컬에 이미 PostgreSQL 이 떠 있어도 충돌 없음)
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: hackathon
      POSTGRES_USER: ${DB_USERNAME:-hackathon}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hackathon}
      TZ: Asia/Seoul
    volumes:
      # PostgreSQL 18+ 는 /var/lib/postgresql 하위에 데이터를 둔다.
      # (17 이하의 /var/lib/postgresql/data 로 마운트하면 볼륨이 무시됨)
      - hackathon-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  hackathon-pgdata: