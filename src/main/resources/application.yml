spring:
  application:
    name: hackathon

  # .env 를 프로퍼티 소스로 로드 (없으면 무시하고 아래 기본값 사용)
  config:
    import: optional:file:.env[.properties]

  # 기본 = docker compose 로 띄운 PostgreSQL (호스트 5433)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/hackathon}
    username: ${DB_USERNAME:hackathon}
    password: ${DB_PASSWORD:hackathon}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    # data.sql 을 Hibernate 가 테이블을 만든 뒤에 실행하도록 미룬다.
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  # data.sql(미션 초기 데이터)을 매 기동 시 실행한다. PostgreSQL 은 always 가 없으면 안 읽는다.
  # data.sql 이 ON CONFLICT DO NOTHING 이라 여러 번 실행돼도 안전하다.
  sql:
    init:
      mode: always

  jackson:
    time-zone: Asia/Seoul

# CORS 허용 오리진 (프론트 주소)
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# AWS S3 (미션 인증 이미지)
# 자격증명(access-key/secret-key)은 .env / 환경변수로만 주입한다. 코드에 두지 않는다.
aws:
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket: ${AWS_S3_BUCKET:dijeok-image-475583545324-ap-northeast-2-an}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    presigned-url-expiration-seconds: ${AWS_S3_PRESIGN_EXPIRE:300}

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-produces-media-type: application/json
