# local 프로파일: Docker 없이 바로 실행 (H2 인메모리)
# 실행: --spring.profiles.active=local
spring:
  datasource:
    url: jdbc:h2:mem:hackathon;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
